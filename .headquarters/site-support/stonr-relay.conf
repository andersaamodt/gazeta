# Headquarters site support policy for the gazeta relay.
# Leave relay_domain and relay_url blank to derive them from the Headquarters
# site domain at install time.
site=gazeta
relay_domain=
relay_url=
mode=site_mirror
public_write=false
# NIP-46 phone signer pairing needs clients to publish encrypted kind 24133
# responses to the home relay. Keep ordinary public writes disabled; only this
# pairing/control kind is accepted from arbitrary authors.
write_kinds=24133
mirror_posts=true
mirror_comments=true
search=false
