# Headquarters site support policy for the nostr-blog relay.
# The blog can remain on new.andersaamodt.com while the home Nostr relay lives
# on the canonical domain that will survive the production cutover.
site=nostr-blog
relay_domain=andersaamodt.com
relay_url=wss://andersaamodt.com
mode=site_mirror
public_write=false
# NIP-46 phone signer pairing needs clients to publish encrypted kind 24133
# responses to the home relay. Keep ordinary public writes disabled; only this
# pairing/control kind is accepted from arbitrary authors.
write_kinds=24133
mirror_posts=true
mirror_comments=true
search=false
